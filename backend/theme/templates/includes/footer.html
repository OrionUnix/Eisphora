{% load i18n %}
<footer class="bg-white">
  <div class="mx-auto max-w-screen-xl space-y-8 px-4 py-16 sm:px-6 lg:space-y-16 lg:px-8">
    <div class="grid grid-cols-1 gap-8 lg:grid-cols-3">
      <div>
        <div class="text-teal-600">
          {% include 'includes/logo.html' with size="h-[96px] w-[96px]" %}
        </div>

        <p class="mt-4 max-w-xs text-gray-500 text-sm">
          {{ seo.current_meta.description }}
        </p>
      </div>

      <div class="lg:col-span-2 flex flex-col justify-end items-end">
        <ul class="flex flex-wrap gap-8 text-sm font-medium text-gray-900">
          <li>
            <a href="#" class="text-gray-700 transition hover:text-teal-600"> {% trans "About" %} </a>
          </li>
          <li>
            <a href="#" class="text-gray-700 transition hover:text-teal-600"> {% trans "FAQs" %} </a>
          </li>
          <li>
            <a href="{% url 'terms' %}" class="text-gray-700 transition hover:text-teal-600"> {% trans "Terms" %} </a>
          </li>
        </ul>
      </div>
    </div>

    <div class="border-t border-gray-100 pt-8 mt-8 flex flex-col sm:flex-row justify-between items-center gap-4">
      <p class="text-[10px] text-gray-400 font-mono uppercase tracking-widest">
        &copy; {% now "Y" %}. {{ seo.site_name }}. All rights reserved.
      </p>
      <p class="text-[10px] text-gray-400 font-mono uppercase tracking-widest">
        Made with love by <span class="font-bold text-gray-600">OrionDeimos</span>
      </p>
    </div>
  </div>
</footer>
